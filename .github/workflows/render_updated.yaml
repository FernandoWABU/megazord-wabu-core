services:
  - type: web
    name: megazord-wabu-core
    runtime: python
    runtimeVersion: 3.11
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python src/webhook_simple.py
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: WEBHOOK_SECRET_KEY
        sync: false
      - key: FERNET_ENCRYPTION_KEY
        sync: false
      - key: TELEGRAM_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_WMT
        sync: false
      - key: ALLOWED_EXTENSION_IDS
        sync: false
      - key: PORT
        value: 10000
