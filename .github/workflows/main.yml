name: Megazord Multi-Tienda

on:
  schedule:
    # ⏱️ RELOJ 1: Liverpool (Cada hora en el minuto 17)
    - cron: '17 * * * *'
    # ⏱️ RELOJ 2: Walmart (Cada 4 horas en el minuto 27 - Ej. 0:27, 4:27, 8:27...)
    - cron: '27 */4 * * *'
  workflow_dispatch:
    inputs:
      tienda:
        description: '¿Qué tienda quieres barrer?'
        required: true
        default: 'ambas'
        type: choice
        options:
          - liverpool
          - walmart
          - ambas

jobs:
  ejecutar_barrido:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Descargar Código Base
        uses: actions/checkout@v3

      - name: 🔐 Crear archivo de credenciales
        run: echo '${{ secrets.GOOGLE_CREDENTIALS }}' > credentials.json

      - name: 🐍 Armar Entorno Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: ⚙️ Instalar Arsenal (Dependencias)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: 🟣 Desplegar Megazord Liverpool
        # Se ejecuta SI le das al botón manual O SI el reloj que lo despertó fue el de cada hora
        if: ${{ (github.event_name == 'workflow_dispatch' && (github.event.inputs.tienda == 'liverpool' || github.event.inputs.tienda == 'ambas')) || github.event.schedule == '17 * * * *' }}
        env:
          SHOP_ID_INTERNO: ${{ secrets.SHOP_ID_INTERNO }}
          SHOP_ID_PUBLICO: ${{ secrets.SHOP_ID_PUBLICO }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_WMT: ${{ secrets.TELEGRAM_CHAT_WMT }}
          LIVERPOOL_USER: ${{ secrets.LIVERPOOL_USER }}
          LIVERPOOL_PASS: ${{ secrets.LIVERPOOL_PASS }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GOOGLE_ENCRYPTION_KEY: ${{ secrets.GOOGLE_ENCRYPTION_KEY }}
        run: python megazord_liverpool.py

      - name: 🔵 Desplegar Megazord Walmart
        # Se ejecuta SI le das al botón manual O SI el reloj que lo despertó fue el de cada 4 horas
        if: ${{ (github.event_name == 'workflow_dispatch' && (github.event.inputs.tienda == 'walmart' || github.event.inputs.tienda == 'ambas')) || github.event.schedule == '27 */4 * * *' }}
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          WALMART_USER: ${{ secrets.WALMART_USER }}
          WALMART_PASS: ${{ secrets.WALMART_PASS }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_WMT: ${{ secrets.TELEGRAM_CHAT_WMT }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SCRAPERAPI_KEY_1: ${{ secrets.SCRAPERAPI_KEY_1 }}
          SCRAPERAPI_KEY_2: ${{ secrets.SCRAPERAPI_KEY_2 }}
          SCRAPERAPI_KEY_3: ${{ secrets.SCRAPERAPI_KEY_3 }}
          SCRAPERAPI_KEY_4: ${{ secrets.SCRAPERAPI_KEY_4 }}
        run: python megazord_walmart.py

      - name: 📸 Subir evidencia de la GoPro
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidencia-login
          path: debug_token.png
