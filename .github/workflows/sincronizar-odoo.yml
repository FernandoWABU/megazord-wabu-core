name: Sincronizador Odoo-DBeaver

on:
  schedule:
    # Servidores GitHub usan UTC (+6 horas de diferencia con CDMX)
    # 11:00 UTC = 5:00 AM CDMX | 23:00 UTC = 5:00 PM CDMX
    - cron: '0 11,23 * * *'
  workflow_dispatch: # Botón manual para dispararlo cuando quieras

jobs:
  sincronizar-costos:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Descargar código
        uses: actions/checkout@v3

      - name: 🐍 Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: ⚙️ Instalar Dependencias
        run: |
          python -m pip install --upgrade pip
          pip install psycopg2-binary python-dotenv

      - name: 🚀 Ejecutar Sincronizador Odoo
        env:
          ODOO_URL: ${{ secrets.ODOO_URL }}
          ODOO_DB: ${{ secrets.ODOO_DB }}
          ODOO_USER: ${{ secrets.ODOO_USER }}
          ODOO_API_KEY: ${{ secrets.ODOO_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python sincronizar_odoo.py
